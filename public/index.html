<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0b0f14" />
<title>지하철 카운트다운</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- 1. 검색 화면 -->
  <section id="screen-search" class="screen active">
    <div id="home-header">
      <h1>🚇 지하철 카운트다운</h1>
      <button id="data-manage-btn" class="link-btn">⚙️ 데이터 관리</button>
    </div>

    <div id="walk-widget">
      <div id="walk-idle" class="walk-state active">
        <button id="walk-start-btn" class="widget-btn">🚶 집에서 출발</button>
        <div id="walk-last-info" class="hint small"></div>
      </div>
      <div id="walk-running" class="walk-state">
        <div id="walk-elapsed">00:00</div>
        <button id="walk-stop-btn" class="widget-btn">🏁 역 도착</button>
      </div>
      <div id="walk-save" class="walk-state">
        <input id="walk-station-input" type="text" placeholder="어느 역이었나요? (예: 강남)" />
        <div class="walk-save-actions">
          <button id="walk-save-btn" class="widget-btn">저장</button>
          <button id="walk-cancel-btn" class="widget-btn-secondary">취소</button>
        </div>
      </div>
    </div>

    <div id="favorites"></div>

    <form id="search-form" autocomplete="off">
      <input id="station-input" type="text" placeholder="역 이름 (예: 강남)" inputmode="text" />
      <button type="submit">검색</button>
    </form>

    <p id="search-error" class="error"></p>
    <p id="search-hint" class="hint">역 이름을 입력하면 운행 방향을 보여드려요.</p>
  </section>

  <!-- 2. 호선 선택 화면 (환승역일 때만) -->
  <section id="screen-lines" class="screen">
    <button class="back-btn" data-back="search">← 다시 검색</button>
    <h2 id="lines-station-name"></h2>
    <p class="hint">환승역이에요. 몇 호선을 찾으시나요?</p>
    <div id="lines-list"></div>
  </section>

  <!-- 3. 방향 선택 화면 -->
  <section id="screen-directions" class="screen">
    <button class="back-btn" id="directions-back-btn">← 다시 검색</button>
    <h2 id="directions-station-name"></h2>
    <div id="directions-list"></div>
  </section>

  <!-- 3. 카운트다운 화면 -->
  <section id="screen-countdown" class="screen">
    <button class="back-btn" data-back="directions">← 방향 선택</button>
    <div id="countdown-header">
      <div id="countdown-header-top">
        <div id="countdown-station"></div>
        <button id="fav-toggle" title="즐겨찾기">☆</button>
      </div>
      <div id="countdown-direction" class="line-badge"></div>
    </div>

    <div id="countdown-display">
      <div id="countdown-seconds">--</div>
      <div id="countdown-status"></div>
    </div>

    <div id="next-train-info"></div>
    <p id="countdown-error" class="error"></p>
    <p class="hint small">5초마다 실제 도착정보로 보정됩니다</p>
  </section>

  <!-- 5. 데이터 관리 화면 -->
  <section id="screen-data" class="screen">
    <button class="back-btn" data-back="search">← 홈으로</button>
    <h2>데이터 관리</h2>
    <p class="hint">모든 기록은 이 휴대폰 브라우저에만 저장돼요. 잘못 쌓인 기록은 여기서 지울 수 있어요.</p>

    <div class="data-section">
      <div class="data-section-header">
        <h3>🚶 도보 시간 기록</h3>
        <button id="clear-walks-btn" class="link-btn">전체 삭제</button>
      </div>
      <div id="walk-log-list"></div>
    </div>

    <div class="data-section">
      <div class="data-section-header">
        <h3>🚇 도착 시각 기록</h3>
        <button id="clear-arrivals-btn" class="link-btn">전체 삭제</button>
      </div>
      <div id="arrival-log-list"></div>
    </div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
